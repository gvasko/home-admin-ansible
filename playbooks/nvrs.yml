- name: Apply NVR configuration
  hosts: nvrs
  gather_facts: yes
  become: yes
  pre_tasks:
    - name: Ensure apt cache is updated
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Perform full dist-upgrade
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes
      register: dist_upgrade

    - name: Reboot if required after dist-upgrade
      reboot:
        reboot_timeout: 600
        test_command: whoami
      when: dist_upgrade.changed

  tasks:
    - name: Ensure /mnt/nvrdisk exists
      file:
        path: /mnt/nvrdisk
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Mount NVR disk on /mnt/nvrdisk
      mount:
        path: /mnt/nvrdisk
        src: UUID={{ nvrdisk_uuid }}
        fstype: ext4
        opts: defaults,noatime
        state: mounted
      when: nvrdisk_uuid is defined

    - name: Ensure /mnt/backup exists
      file:
        path: /mnt/backup
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Mount backup disk on /mnt/backup
      mount:
        path: /mnt/backup
        src: UUID={{ backupdisk_uuid }}
        fstype: ext4
        opts: defaults,noatime
        state: mounted
      when: backupdisk_uuid is defined

    - name: Install prerequisites for Docker
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Add Docker official GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Docker Engine and Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: latest

    - name: Ensure Docker service is started and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add Docker users to docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop: "{{ docker_users | default([]) }}"
      when: docker_users is defined

  roles:
    - common

- name: Apply NVR configuration
  hosts: nvrs
  gather_facts: yes
  become: yes
  pre_tasks:
    - name: Set system timezone to Europe/Budapest
      community.general.timezone:
        name: Europe/Budapest
      become: true

    - name: Ensure apt cache is updated
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Perform full dist-upgrade
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes
      register: dist_upgrade

    - name: Reboot if required after dist-upgrade
      reboot:
        reboot_timeout: 600
        test_command: whoami
      when: dist_upgrade.changed

    - name: Install tools
      apt:
        name:
          - ifstat
          - intel-gpu-tools
          - mc
        state: present
        update_cache: yes

  tasks:
    - name: Ensure /mnt/nvrdisk exists
      file:
        path: /mnt/nvrdisk
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Mount NVR disk on /mnt/nvrdisk
      mount:
        path: /mnt/nvrdisk
        src: UUID={{ nvrdisk_uuid }}
        fstype: ext4
        opts: defaults,noatime
        dump: "0"
        passno: "2"        
        state: mounted
      when: nvrdisk_uuid is defined

    - name: Ensure /mnt/backup exists
      file:
        path: /mnt/backup
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Mount backup disk on /mnt/backup
      mount:
        path: /mnt/backup
        src: UUID={{ backupdisk_uuid }}
        fstype: ext4
        opts: defaults,noatime,nofail
        dump: "0"
        passno: "2"        
        state: mounted
      when: backupdisk_uuid is defined

    - name: Add nvr user to adm group
      ansible.builtin.user:
        name: nvr
        groups: adm
        append: yes
      become: true

    - name: Ensure NVR home automation directory exists
      file:
        path: /home/nvr/home-admin
        state: directory
        owner: nvr
        group: nvr
        mode: '0755'

    - name: Ensure cam-backup log file exists
      ansible.builtin.file:
        path: /var/log/cam-backup.log
        state: touch
        owner: root
        group: adm
        mode: '0664'
        modification_time: preserve
        access_time: preserve
      become: true

    - name: Create logrotate configuration for cam-backup
      ansible.builtin.copy:
        dest: /etc/logrotate.d/cam-backup
        owner: root
        group: adm
        mode: '0664'
        content: |
          /var/log/cam-backup.log {
              daily
              rotate 3
              missingok
              notifempty
              create 0664 root adm
          }
      become: true

    - name: Ensure cam-upload log file exists
      ansible.builtin.file:
        path: /var/log/cam-upload.log
        state: touch
        owner: root
        group: adm
        mode: '0664'
        modification_time: preserve
        access_time: preserve
      become: true 

    - name: Create logrotate configuration for cam-upload
      ansible.builtin.copy:
        dest: /etc/logrotate.d/cam-upload
        owner: root
        group: adm
        mode: '0664'
        content: |
          /var/log/cam-upload.log {
              daily
              rotate 3
              missingok
              notifempty
              create 0664 root adm
          }
      become: true

    - name: Copy host scripts to NVR home admin directory
      synchronize:
        src: "{{ playbook_dir }}/../scripts/"
        dest: /home/nvr/home-admin/
        recursive: yes
        delete: no
      become: false

    - name: Ensure NVR home automation scripts are owned by nvr
      file:
        path: /home/nvr/home-admin
        state: directory
        recurse: yes
        owner: nvr
        group: nvr
        mode: '0755'

    - name: Link secret file to project .env
      ansible.builtin.file:
        src: /home/nvr/.home-automation.secrets
        dest: /home/nvr/home-admin/nvr/.env
        state: link
        force: yes

    - name: Install NUT for Eaton UPS monitoring
      apt:
        name:
          - nut
          - nut-server
          - nut-client
        state: latest
        update_cache: yes

    - name: Configure NUT standalone mode
      copy:
        dest: /etc/nut/nut.conf
        content: |
          MODE=standalone
        owner: root
        group: nut
        mode: '0640'

    - name: Configure NUT UPS definition
      copy:
        dest: /etc/nut/ups.conf
        content: |
          [eaton]
              driver = usbhid-ups
              port = auto
              desc = "EATON UPS 5E 900 USB DIN Gen2"
              vendorid = 0463
              productid = ffff
              ignorelb
              override.battery.charge.low = 60
        owner: root
        group: nut
        mode: '0640'

    - name: Configure NUT server listeners
      copy:
        dest: /etc/nut/upsd.conf
        content: |
          LISTEN 127.0.0.1 3493
        owner: root
        group: nut
        mode: '0640'

    - name: Configure NUT users
      copy:
        dest: /etc/nut/upsd.users
        content: |
          [monuser]
              password = monitor
              upsmon primary
        owner: root
        group: nut
        mode: '0640'

    - name: Configure NUT logs
      copy:
        dest: /etc/nut/upslog.conf
        content: |
          MONITOR eaton@localhost "/var/log/ups/upslog.log" "[%TIME @Y-@m-@d @H:@M:@S%] Battery: %VAR battery.charge %%%
          Input voltage: %VAR input.voltage% UPS load: %VAR ups.load% STATUS: [%VAR ups.status%] Temperature: %VAR ups.temperature% Frequency: %VAR input.frequency%"
        owner: root
        group: nut
        mode: '0640'

    - name: Add UPS notify script
      copy:
        dest: /etc/nut/ups-notify.sh
        content: |
          #!/bin/bash
          curl -s \
          --form-string "token={{ lookup('env', 'CTRLNODE_PUSHOVER_UPS_TOKEN') }}" \
          --form-string "user={{ lookup('env', 'CTRLNODE_PUSHOVER_USERKEY') }}" \
          --form-string "message=$1" \
          https://api.pushover.net/1/messages.json
        owner: root
        group: nut
        mode: '0755'  

    - name: Configure NUT monitor
      copy:
        dest: /etc/nut/upsmon.conf
        content: |
          MONITOR eaton@localhost 1 monuser monitor primary
          MINSUPPLIES 1
          SHUTDOWNCMD "/sbin/shutdown -h +0"
          NOTIFYCMD /etc/nut/ups-notify.sh
          NOTIFYMSG ONLINE      "UPS-OK %s on line power"
          NOTIFYMSG ONBATT      "UPS-ALERT %s on battery"
          NOTIFYMSG LOWBATT     "UPS-ALERT %s battery is low"
          NOTIFYMSG FSD         "UPS-ALERT %s: forced shutdown in progress"
          NOTIFYMSG COMMOK      "UPS-OK Communications with UPS %s established"
          NOTIFYMSG COMMBAD     "UPS-ERR Communications with UPS %s lost"
          NOTIFYMSG SHUTDOWN    "UPS-ALERT Auto logout and shutdown proceeding"
          NOTIFYMSG REPLBATT    "UPS-WARN %s battery needs to be replaced"
          NOTIFYMSG NOCOMM      "UPS-ERR %s is unavailable"
          NOTIFYMSG NOPARENT    "UPS-ERR upsmon parent process died - shutdown impossible"
          NOTIFYMSG CAL         "UPS-INFO %s: calibration in progress"
          NOTIFYMSG OFF         "UPS-ALERT %s: administratively OFF or asleep"
          NOTIFYMSG NOTOFF      "UPS-OK %s: no longer administratively OFF or asleep"
          NOTIFYMSG BYPASS      "UPS-WARN %s: on bypass (powered, not protecting)"
          NOTIFYMSG NOTBYPASS   "UPS-OK %s: no longer on bypass"
          NOTIFYFLAG ONLINE	SYSLOG+EXEC
          NOTIFYFLAG ONBATT	SYSLOG+EXEC
          NOTIFYFLAG LOWBATT	SYSLOG+EXEC
          NOTIFYFLAG FSD		SYSLOG+EXEC
          NOTIFYFLAG COMMOK	SYSLOG+EXEC
          NOTIFYFLAG COMMBAD	SYSLOG+EXEC
          NOTIFYFLAG SHUTDOWN	SYSLOG+EXEC
          NOTIFYFLAG REPLBATT	SYSLOG+EXEC
          NOTIFYFLAG NOCOMM	SYSLOG+EXEC
          NOTIFYFLAG NOPARENT	SYSLOG+EXEC
        owner: root
        group: nut
        mode: '0640'

    - name: Ensure Eaton NUT driver is started and enabled
      ansible.builtin.systemd_service:
        name: nut-driver@eaton.service
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Ensure NUT server is started and enabled
      ansible.builtin.systemd_service:
        name: nut-server.service
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Ensure NUT monitor is started and enabled
      ansible.builtin.systemd_service:
        name: nut-monitor.service
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Add Coral Edge TPU APT repository key
      apt_key:
        url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
        state: present

    - name: Add Coral Edge TPU APT repository
      apt_repository:
        repo: "deb [arch=amd64] https://packages.cloud.google.com/apt coral-edgetpu-stable main"
        state: present
        filename: coral-edgetpu

    - name: Update apt cache after adding Coral repo
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Coral USB Edge TPU runtime
      apt:
        name:
          - libedgetpu1-std
        state: latest

    - name: Configure Coral USB access rules
      copy:
        dest: /etc/udev/rules.d/99-coral.rules
        content: |
          SUBSYSTEM=="usb", ATTR{idVendor}=="1a6e", GROUP="plugdev", MODE="0660"
          SUBSYSTEM=="usb", ATTR{idVendor}=="18d1", GROUP="plugdev", MODE="0660"
        owner: root
        group: root
        mode: '0600'

    - name: Reload udev rules and trigger
      ansible.builtin.shell: udevadm control --reload-rules && udevadm trigger
      become: true

    - name: Create NVR home automation secrets file
      template:
        src: "{{ playbook_dir }}/../templates/home-automation.secrets.j2"
        dest: /home/nvr/.home-automation.secrets
        owner: nvr
        group: nvr
        mode: '0600'

    - name: Install prerequisites for Docker
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Add Docker official GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Docker Engine and Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: latest

    - name: Ensure Docker service is started and enabled
      ansible.builtin.systemd_service:
        name: docker
        state: started
        enabled: yes

    - name: Add nvr user to docker group
      ansible.builtin.user:
        name: nvr
        groups: docker
        append: yes
      become: true

    - name: Install Tailscale using official script
      shell: curl -fsSL https://tailscale.com/install.sh | sh
      become: true
      args:
        creates: /usr/bin/tailscale

    - name: Install Nginx
      ansible.builtin.package:
        name: nginx
        state: present

    - name: Copy Nginx configuration file
      ansible.builtin.copy:
        src: ../templates/nginx/frigate
        dest: /etc/nginx/sites-available/frigate
        mode: '0644'
      notify: Reload Nginx

    - name: Enable the Nginx site by creating a symlink
      ansible.builtin.file:
        src: /etc/nginx/sites-available/frigate
        dest: /etc/nginx/sites-enabled/frigate
        state: link
      notify: Reload Nginx

    - name: Ensure Nginx is started and enabled
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: yes

    - name: Remove the default Nginx site symlink
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload Nginx

    - name: Download Microsoft repository configuration
      ansible.builtin.get_url:
        url: "https://packages.microsoft.com/config/ubuntu/24.04/packages-microsoft-prod.deb"
        dest: /tmp/packages-microsoft-prod.deb

    - name: Install Microsoft repository package
      ansible.builtin.apt:
        deb: /tmp/packages-microsoft-prod.deb

    - name: Update apt cache and install azcopy
      ansible.builtin.apt:
        name: azcopy
        update_cache: yes
        state: present

    - name: Clean up the .deb installer
      ansible.builtin.file:
        path: /tmp/packages-microsoft-prod.deb
        state: absent

    - name: Schedule all background tasks
      ansible.builtin.cron:
        name: "{{ item.name }}"
        minute: "{{ item.minute | default('*') }}"
        hour: "{{ item.hour | default('*') }}"
        job: "{{ item.job }}"
        state: present
        user: nvr
      loop:
        - name: "cam-backup local copy"
          job: "/home/nvr/home-admin/nvr/cron/cam-backup.sh"
        - name: "cam-upload"
          minute: "*/2"
          job: "/home/nvr/home-admin/nvr/cron/cam-upload.sh"
        - name: "event-video cleanup"
          minute: "5"
          hour: "21"
          job: "/home/nvr/home-admin/nvr/cron/detector-cleanup.sh"
        - name: "backup test"
          minute: "5"
          hour: "5"
          job: "/home/nvr/home-admin/nvr/cron/backup-test.sh"
        - name: "disk space test"
          minute: "5"
          hour: "6"
          job: "/home/nvr/home-admin/nvr/cron/test-disk-space.sh"
        - name: "docker logs test"
          minute: "2"
          job: "/home/nvr/home-admin/nvr/cron/test-docker-logs.sh"

    - name: Send message after boot
      ansible.builtin.cron:
        name: "message at boot"
        special_time: reboot
        job: "sleep 10 && /home/nvr/home-admin/nvr/cron/test-docker-logs.sh"
        user: nvr


  handlers:
    - name: Reload Nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

  roles:
    - common
